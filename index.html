<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WHOAMI</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0f172a;
        color: #e2e8f0;
      }

      .card {
        width: min(90vw, 480px);
        padding: 2.5rem 2rem;
        border-radius: 1rem;
        background: linear-gradient(145deg, #1e293b, #0f172a);
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.35);
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        text-align: center;
      }

      .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 15px rgba(255, 255, 255, 0.05);
      }

      .avatar {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        margin: 0 auto 1.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
        color: white;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        border: 3px solid #1e293b;
      }

      h1 {
        margin-top: 0;
        margin-bottom: 0.5rem;
        font-size: 2.25rem;
        letter-spacing: -0.025em;
        font-weight: 800;
        background: linear-gradient(to right, #f8fafc, #94a3b8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      p {
        margin-top: 0;
        margin-bottom: 2rem;
        color: #94a3b8;
        font-size: 1.1rem;
      }

      .separator {
        height: 1px;
        background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.1), transparent);
        margin: 1.5rem 0;
      }

      ul {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        grid-template-columns: 1fr;
        gap: 1rem;
      }

      @media (min-width: 400px) {
        ul {
          grid-template-columns: 1fr 1fr;
        }
      }

      a {
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        padding: 0.875rem 1rem;
        border-radius: 0.75rem;
        background: rgba(51, 65, 85, 0.6);
        color: #f8fafc;
        font-weight: 600;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      a:hover,
      a:focus-visible {
        transform: scale(1.03);
        outline: none;
        box-shadow: 0 0 0 2px rgba(148, 163, 184, 0.5);
      }

      a.github:hover { background: #24292e; border-color: #24292e; }
      a.linkedin:hover { background: #0077b5; border-color: #0077b5; }
      a.steam:hover { background: #171a21; border-color: #171a21; }
      a.instagram:hover { background: #e1306c; border-color: #e1306c; }
      a.email:hover { background: #ea4335; border-color: #ea4335; }

      .icon {
        width: 1.25rem;
        height: 1.25rem;
        display: inline-block;
        margin-right: 0.75rem;
        vertical-align: middle;
        fill: currentColor;
      }
    </style>
