<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WHOAMI</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0f172a;
        color: #e2e8f0;
      }

      .card {
        width: min(90vw, 480px);
        padding: 2rem;
        border-radius: 1rem;
        background: #1e293b;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin-top: 0;
        margin-bottom: 0.5rem;
      }

      p {
        margin-top: 0;
        margin-bottom: 1.5rem;
        color: #cbd5e1;
      }

      ul {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 0.75rem;
      }

      a {
        display: block;
        text-decoration: none;
        padding: 0.75rem 1rem;
        border-radius: 0.75rem;
        background: #334155;
        color: #f8fafc;
        font-weight: 600;
      }

      a:hover,
      a:focus-visible {
        background: #475569;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Sup fam, sunny init</h1>
      <p>Find me on these socials:</p>
      <ul>
        <li><a href="https://github.com/cenzman" target="_blank" rel="noreferrer">GitHub</a></li>
        <li><a href="https://www.linkedin.com" target="_blank" rel="noreferrer">LinkedIn</a></li>
        <li><a href="https://youtu.be/NmjrfXO0mdk?si=Et-vbHa0peqkE1pA" target="_blank" rel="noreferrer"> Steam </a></li>
        <li><a href="https://www.instagram.com/_cenecek._/" target="_blank" rel="noreferrer">Instagram</a></li>
      </ul>
    </main>
  </body>
</html>
